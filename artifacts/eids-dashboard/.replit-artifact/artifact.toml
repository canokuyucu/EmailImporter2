kind = "web"
previewPath = "/"
title = "EIDS Yetki Takip"
version = "1.0.0"
id = "artifacts/eids-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23448
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/eids-dashboard run dev"

[services.env]
PORT = "23448"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/eids-dashboard", "run", "build"]
publicDir = "artifacts/eids-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
